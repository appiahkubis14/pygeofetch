# Automatically compile paper.pdf on every push to main or PR touching the paper/
# The compiled PDF is available as a workflow artifact under the Actions tab.

name: Build JOSS paper PDF

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:   # allow manual trigger

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Build draft PDF
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build paper PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: pygeofetch-joss-paper
          path: paper/paper.pdf
          if-no-files-found: error
