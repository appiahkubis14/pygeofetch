{% set version = "1.2.0" %}

package:
  name: pygeofetch
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pygeofetch/pygeofetch-{{ version }}.tar.gz
  sha256: 0307001e4a585f035c709ccc61c7b23217280a7ddf2775229600340d878b5cf2

build:
  entry_points:
    - pygeofetch = pygeofetch.cli.main:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=3.9
    - httpx >=0.27
    - click >=8.1
    - pydantic >=2.5
    - pydantic-settings >=2.1
    - rich >=13.7
    - pyyaml >=6.0
    - cryptography >=42.0
    - keyring >=24.3
    - aiofiles >=23.2
    - tenacity >=8.2
    - python-dateutil >=2.9
    - tqdm >=4.66
    - requests >=2.31
    - anyio >=4.2
    - boto3 >=1.34
    - click-completion >=0.5

test:
  imports:
    - pygeofetch
  commands:
    - pip check
    - pygeofetch --help
  requires:
    - pip
    - python

about:
  home: https://github.com/appiahkubis14/pygeofetch
  summary: Universal satellite data pipeline — unified access to 22+ providers
  doc_url: https://pygeofetch.readthedocs.io
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - appiahkubis14
