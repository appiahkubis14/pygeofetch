[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pygeovision"
dynamic = ["version"]
description = "The World-Class Geospatial AI Platform — PyGeoFetch × GeoAI × EarthNets"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [{name = "PyGeoVision Contributors"}]
keywords = ["satellite", "geospatial", "remote-sensing", "geoai", "pygeofetch", "earthnets", "deep-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: GIS",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Image Processing",
]
requires-python = ">=3.10"
dependencies = [
    "pygeofetch>=0.1.0",
    "pystac>=1.9",
    "pystac-client>=0.7",
    "planetary-computer>=1.0",
    "pydantic>=2.0",
    "click>=8.0",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "tenacity>=8.2",
    "numpy>=1.24",
    "rich>=13.0",
    "shapely>=2.0",
    "pyproj>=3.6",
]

[project.optional-dependencies]
# Optional: GeoAI package for additional model weights (SAM, Prithvi, ChangeSTAR).
# PyGeoVision works fully independently WITHOUT geoai-py installed.
geoai = ["geoai-py>=0.39.0"]

# Core geospatial stack
geo   = ["rasterio>=1.3", "geopandas>=1.0", "rioxarray>=0.15", "pyogrio>=0.7",
         "shapely>=2.0", "pyproj>=3.6"]

# Visualisation
viz   = ["matplotlib>=3.8", "folium>=0.16", "plotly>=5.18", "scikit-learn>=1.3",
         "seaborn>=0.13"]

# Training (PyTorch + geospatial losses + HPO)
train = ["torch>=2.0", "torchvision>=0.15", "timm>=0.9",
         "segmentation-models-pytorch>=0.3", "albumentations>=1.4",
         "optuna>=3.5", "mlflow>=2.10", "wandb>=0.16"]

# Model serving + ONNX
serve = ["fastapi>=0.110", "uvicorn>=0.29", "onnxruntime>=1.17",
         "onnxsim>=0.4", "pydantic>=2.0"]

# Auto-labeling sources
labeling = ["requests>=2.31", "laspy>=2.0", "s2sphere>=0.2.5",
            "scipy>=1.12", "Pillow>=10.0"]

# Vision-Language Models
vlm   = ["transformers>=4.39", "torch>=2.0", "Pillow>=10.0",
         "openclip-torch>=2.24"]

# XAI / Explainability
xai   = ["shap>=0.45", "captum>=0.7", "torch>=2.0", "matplotlib>=3.8"]

# Foundation models (DINOv2, Prithvi)
foundation = ["transformers>=4.39", "torch>=2.0", "hdbscan>=0.8.33",
              "scikit-learn>=1.3", "umap-learn>=0.5"]

# Few-shot + AutoML
advanced = ["transformers>=4.39", "torch>=2.0", "optuna>=3.5",
            "scikit-learn>=1.3"]

# Cloud deployment
cloud = ["boto3>=1.34", "sagemaker>=2.0",
         "azure-ai-ml>=1.14", "azure-identity>=1.16",
         "google-cloud-aiplatform>=1.47", "google-cloud-storage>=2.14"]

# Edge deployment
edge  = ["onnxruntime>=1.17", "onnxsim>=0.4"]

# Time series + 3D
geo3d = ["laspy>=2.0", "scipy>=1.12", "pandas>=2.0"]

# Development
dev   = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.9",
         "black>=24", "pre-commit>=3.6"]

# Monitoring
monitoring = ["scipy>=1.12", "matplotlib>=3.8"]

# Everything (excluding cloud/edge — install those separately)
all   = ["pygeovision[geoai,geo,viz,train,serve,labeling,vlm,xai,foundation,advanced,monitoring]"]

# Minimal install for new users
minimal = ["pygeovision[geo,viz,train]"]

[project.scripts]
pygeovision = "pygeovision.cli.main:main"

[project.urls]
Homepage      = "https://pygeovision.org"
Documentation = "https://docs.pygeovision.org"
Repository    = "https://github.com/pygeovision/pygeovision"
Issues        = "https://github.com/pygeovision/pygeovision/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["pygeovision*"]

[tool.setuptools.dynamic]
version = {attr = "pygeovision._version.__version__"}

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "W", "I", "B", "C4", "UP"]
ignore = ["E501", "B008", "B905"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = false
